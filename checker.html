<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#1a6fe8;
  --blue-dark:#1358c4;
  --blue-light:#e8f1fd;
  --blue-msg:#dbeafe;
  --text:#1a1a1a;
  --text-sub:#555;
  --border:#e4e4e4;
  --bg:#f7f9fc;
  --white:#fff;
}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);font-size:15px;line-height:1.7;height:100dvh;display:flex;flex-direction:column;}

/* Header */
header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.logo-drop{width:26px;height:26px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;}
.header-back{font-size:13px;color:var(--blue);text-decoration:none;}

/* AdSense top */
.ad-top{background:var(--white);border-bottom:1px solid var(--border);padding:6px 16px;text-align:center;flex-shrink:0;}
.ad-label{font-size:10px;color:#bbb;margin-bottom:2px;}

/* Chat container */
.chat-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}

/* Messages */
.msg{display:flex;gap:10px;max-width:100%;}
.msg-ai{align-items:flex-start;}
.msg-user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;margin-top:2px;}
.msg-bubble{max-width:calc(100% - 50px);padding:12px 14px;border-radius:12px;font-size:14px;line-height:1.75;}
.msg-ai .msg-bubble{background:var(--white);border:1px solid var(--border);border-radius:4px 12px 12px 12px;}
.msg-user .msg-bubble{background:var(--blue);color:#fff;border-radius:12px 4px 12px 12px;}
.msg-bubble strong{font-weight:700;display:block;margin-bottom:4px;}
.msg-bubble .price{font-size:18px;font-weight:700;color:var(--blue);font-family:'Inter',sans-serif;margin:8px 0;}
.msg-user .msg-bubble .price{color:#fff;}
.msg-bubble .tip{background:var(--bg);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--text-sub);margin-top:8px;border-left:3px solid var(--blue);}
.msg-bubble ul{padding-left:18px;margin:8px 0;}
.msg-bubble ul li{margin-bottom:4px;font-size:13px;}
.msg-bubble .step-list{list-style:none;padding:0;margin:8px 0;}
.msg-bubble .step-list li{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:8px;align-items:flex-start;}
.msg-bubble .step-list li:last-child{border-bottom:none;}
.step-no{background:var(--blue);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;margin-bottom:6px;}
.badge-low{background:#ebfbee;color:#2f9e44;}
.badge-mid{background:#fff9db;color:#e67700;}
.badge-high{background:#fff5f5;color:#e03131;}

/* Typing indicator */
.typing{display:flex;gap:4px;align-items:center;padding:14px;}
.typing span{width:7px;height:7px;background:#ccc;border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* Vendor button inside chat */
.vendor-btn{display:block;width:100%;margin-top:10px;padding:11px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;}
.vendor-btn:hover{background:var(--blue-dark);}

/* Example chips */
.example-wrap{padding:8px 16px 0;flex-shrink:0;}
.example-label{font-size:11px;color:#999;margin-bottom:6px;}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;}
.chip{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;transition:border-color 0.15s,background 0.15s;color:var(--text);}
.chip:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}

/* Input area */
.input-area{background:var(--white);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;}
textarea{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;resize:none;line-height:1.6;min-height:44px;max-height:120px;outline:none;transition:border-color 0.15s;}
textarea:focus{border-color:var(--blue);}
textarea::placeholder{color:#bbb;}
.send-btn{width:44px;height:44px;background:var(--blue);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;}
.send-btn:hover{background:var(--blue-dark);}
.send-btn:disabled{background:#ccc;cursor:not-allowed;}
.send-btn svg{width:18px;height:18px;fill:#fff;}
.input-note{font-size:11px;color:#bbb;margin-top:6px;text-align:center;}

/* Modal */
/* Intent buttons */
.intent-btn{display:block;width:100%;padding:11px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;margin-top:4px;transition:background 0.15s;}
.intent-btn:hover{background:var(--blue-dark);}
.intent-btn:disabled{background:#ccc;cursor:not-allowed;}
.intent-btn-outline{background:var(--white);color:var(--blue);border:2px solid var(--blue);}
.intent-btn-outline:hover{background:var(--blue-light);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%;max-width:560px;margin:0 auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text-sub);margin-bottom:20px;}
.modal-vendors{display:flex;flex-direction:column;gap:10px;}
.vendor-link{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);font-size:14px;font-weight:500;transition:border-color 0.15s,background 0.15s;}
.vendor-link:hover{border-color:var(--blue);background:var(--blue-light);}
.vendor-link .arrow{color:var(--blue);font-size:18px;}
.vendor-tag{font-size:11px;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:4px;font-weight:400;}
.modal-close{margin-top:16px;width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;color:var(--text-sub);font-family:'Noto Sans JP',sans-serif;}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-drop">💧</div>
    水道トラブル相場チェッカー
  </div>
  <a href="/" class="header-back">← トップ</a>
</header>

<!-- AdSense Top -->
<div class="ad-top">
  <div class="ad-label">広告</div>
  <ins class="adsbygoogle" style="display:block;height:50px;" data-ad-client="YOUR_ADSENSE_ID" data-ad-slot="YOUR_AD_SLOT_3" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Chat -->
<div class="chat-wrap" id="chatWrap">
  <!-- Initial AI message -->
  <div class="msg msg-ai">
    <div class="msg-avatar">💧</div>
    <div class="msg-bubble">
      <strong>水道トラブルAIへようこそ</strong>
      水漏れ・詰まり・凍結など、水道に関するトラブルをなんでもご相談ください。<br><br>
      症状を入力していただくと、次の2点をご案内します。<br>
      ・<b>自分で直す方法（DIY）</b>と必要な部品<br>
      ・<b>業者に頼んだ場合の費用目安</b>と応急処置
    </div>
  </div>
</div>

<!-- Example chips -->
<div class="example-wrap">
  <div class="example-label">よくある症状（タップで入力）</div>
  <div class="chip-row">
    <div class="chip" onclick="setExample('キッチンの蛇口からポタポタ水が漏れています')">🚿 蛇口から水漏れ</div>
    <div class="chip" onclick="setExample('トイレが詰まって水が流れなくなりました')">🚽 トイレが詰まった</div>
    <div class="chip" onclick="setExample('朝起きたら外の水道管が凍結して破裂していました')">❄️ 凍結・破裂</div>
    <div class="chip" onclick="setExample('お風呂の排水口から異臭がして流れも遅いです')">💧 排水が臭い・遅い</div>
  </div>
</div>

<!-- Input area -->
<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" placeholder="症状を入力してください（例：キッチンの蛇口からポタポタ水が漏れています）" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="送信">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-note">水道・配管・排水トラブル専用AIです</div>
</div>

<!-- Vendor Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">🔍 無料で業者を探す</div>
    <div class="modal-sub">信頼できる業者に無料で見積り依頼ができます</div>
    <div class="modal-vendors">
      <!-- ▼▼▼ A8.net登録後にリンクを差し替えてください ▼▼▼ -->
      <a href="YOUR_ASP_LINK_1" target="_blank" rel="noopener" class="vendor-link" onclick="trackVendor('vendor_a')">
        <span>業者A <span class="vendor-tag">無料見積り</span></span>
        <span class="arrow">→</span>
      </a>
      <a href="YOUR_ASP_LINK_2" target="_blank" rel="noopener" class="vendor-link" onclick="trackVendor('vendor_b')">
        <span>業者B <span class="vendor-tag">24時間対応</span></span>
        <span class="arrow">→</span>
      </a>
      <a href="YOUR_ASP_LINK_3" target="_blank" rel="noopener" class="vendor-link" onclick="trackVendor('vendor_c')">
        <span>業者C <span class="vendor-tag">全国対応</span></span>
        <span class="arrow">→</span>
      </a>
      <!-- ▲▲▲ ここまで差し替え ▲▲▲ -->
    </div>
    <button class="modal-close" onclick="closeModalBtn()">閉じる</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは水道・配管・排水・外構の水道トラブル専門アドバイザーです。
日本語で回答してください。

【対応するトラブルカテゴリ】
- キッチン（蛇口・排水・食洗機など）
- トイレ（詰まり・水漏れ・交換など）
- お風呂・洗面（シャワー・混合栓・給湯器など）
- 配管・排水（床下・壁内・凍結・全体つまりなど）
- 外構・屋外（散水栓・水栓柱・桝・地中配管など）

【対応しない質問への対応】
水道・配管・排水トラブル以外の質問には「申し訳ありません。当サービスは水道・配管トラブルに特化しています。水回りのトラブルについてお気軽にご相談ください。」と丁重に断る。

【会話フロー】
1. ユーザーの症状を把握する
2. 必ず以下の質問をする：
「自分で修理したいですか？それとも業者に頼んだ場合の費用目安を知りたいですか？」
3. 回答に応じて以下のフォーマットで答える

【DIYルート回答フォーマット】
■ 症状の診断
（症状の原因と概要を2〜3文で）

■ DIY難易度：★☆☆（簡単）/ ★★☆（普通）/ ★★★（業者推奨）

■ 必要な部品
・部品名：（型番の目安）
・価格目安：¥〇〇〇〜¥〇〇〇
・入手先：ホームセンター（コメリ・カインズ等）/ Amazon等

■ 作業手順
1. （手順1）
2. （手順2）
3. （手順3）
※手順は3〜5ステップで簡潔に

■ 注意点
（安全上の注意・難しい場合の判断基準）

【業者ルート回答フォーマット】
■ 症状の診断
（症状の原因と概要を2〜3文で）

■ 修理費用の目安
¥〇〇,〇〇〇 〜 ¥〇〇〇,〇〇〇
（内訳：出張費・部品代・工賃込みの目安）

■ リスクレベル：低 / 中 / 高（緊急）

■ 応急処置
（業者到着までにできること）

■ 業者選びのポイント
（1〜2点で簡潔に）

【DIY絶対不可の場合】
以下は必ず業者を推奨し、DIYを勧めない：
- 壁内・床下の配管
- 水道メーター前後の工事
- ガス給湯器関連
- 大規模な地中配管・掘削が必要な工事
- 電気系統が絡む工事

回答は簡潔にまとめ、専門用語は平易な言葉で補足すること。`;

let messages = [];
let isLoading = false;

function setExample(text) {
  document.getElementById('userInput').value = text;
  autoResize(document.getElementById('userInput'));
  document.getElementById('userInput').focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(role, content) {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = `msg msg-${role === 'user' ? 'user' : 'ai'}`;

  if (role === 'user') {
    div.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">💧</div>
      <div class="msg-bubble">${formatAIText(content)}</div>`;
  }
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function showTyping() {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">💧</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function formatAIText(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/■\s(.+)/g,'<strong>■ $1</strong>')
    .replace(/¥[\d,]+\s*〜\s*¥[\d,]+/g,'<span class="price">$&</span>')
    .replace(/★★★/g,'<span style="color:#e67700">★★★</span>')
    .replace(/★★☆/g,'<span style="color:#e67700">★★☆</span>')
    .replace(/★☆☆/g,'<span style="color:#2f9e44">★☆☆</span>')
    .replace(/\n/g,'<br>');

  // 意図確認の質問が含まれる場合は選択ボタンを表示
  if (text.includes('自分で修理したいですか') || text.includes('費用目安を知りたいですか')) {
    html += `
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
        <button class="intent-btn" onclick="selectIntent('自分で修理したいです（DIY方法を教えてください）')">🔧 自分で直したい（DIY）</button>
        <button class="intent-btn intent-btn-outline" onclick="selectIntent('業者に頼んだ場合の費用目安を知りたいです')">💰 業者費用の目安を知りたい</button>
      </div>`;
  }

  // 業者ルートの場合は業者ボタンを追加
  if (text.includes('修理費用の目安') || (text.includes('業者') && text.includes('■'))) {
    html += `<button class="vendor-btn" onclick="openModal()">🔍 無料で業者を探す</button>`;
  }
  return html;
}

function selectIntent(text) {
  // ボタンを非活性化（二重送信防止）
  document.querySelectorAll('.intent-btn').forEach(b => b.disabled = true);
  document.getElementById('userInput').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      addMessage('assistant', 'エラーが発生しました。しばらくしてから再度お試しください。');
    } else {
      const aiText = data.content[0].text;
      messages.push({ role: 'assistant', content: aiText });
      addMessage('assistant', aiText);

      // GA4イベント送信
      gtag('event', 'ai_chat', { event_category: 'chat', event_label: text.slice(0,50) });
    }
  } catch(e) {
    removeTyping();
    addMessage('assistant', '通信エラーが発生しました。インターネット接続をご確認ください。');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  gtag('event', 'open_vendor_modal', { event_category: 'conversion' });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function trackVendor(name) {
  gtag('event', 'vendor_click', { event_category: 'conversion', event_label: name });
}
</script>
</body>
</html>
